body:
  text: 無礙解道歸命彼世尊應供等覺者論母聽聞之慧是聞所成智聽聞後律儀之慧是戒所成智律儀後定之慧是修定所成智緣攝受之慧是法所依智攝過去未來現在之諸法所決定之慧是會得智觀現在諸法變壞之慧是觀生滅智思擇所緣而觀破壞之慧是正觀智怖畏近住之慧是過患智停止簡擇欲解脫之慧是捨諸行智外出離退轉之慧是種姓地智俱出離退轉之慧是道智加行止滅之慧是果智觀所斷之慧是解脫智正觀其時所修得諸法之慧是觀察智內決定之慧是事之種種相智外決定之慧是行境之種種相智所行決定之慧是所行之種種相智四法決定之慧是地之種種相智九法決定之慧是法之種種相智通智之慧是所知義之智遍智之慧是度義之智斷之慧是永捨義之智修習之慧是一味義之智現證之慧是觸接義之智義之種種相慧是義無礙解智法之種種相慧是法無礙解智詞之種種相慧是詞無礙解智辨之種種相慧是辨無礙解智住之種種相慧是住義之智等至之種種相慧是等至義之智住等至之種種相慧是住等至義之智以無散亂清淨為體而斷漏之慧是無間三摩地智見增上與寂靜得住乃妙勝解之慧是無諍住之智具二力止三行依十六智行及九三摩地行得自在之慧是滅盡定智正知者流轉永盡之慧是般涅槃之智一切諸法之正斷滅不近住性之慧是齊首義之智別性異性一性威力永盡之慧是漸損義之智依不怠持心精勤義之慧是發勤之智說明種種法之慧是顯示義之智通達一切諸法之攝一異性一性之慧是見清淨之智已解之慧是忍智觸之慧是深解智總攝之慧是分住智增上性之慧是想退轉智異性之慧是思退轉智攝持之慧是心退轉智空性之慧是智退轉智最捨之慧是解脫退轉智如義之慧是諦退轉智決定身心於一依攝持樂想輕想力神通義之慧是神通類智依尋思遍滿之力深解異性一性聲相之慧是耳界清淨智依三心之遍滿依五根明淨之力深解異性一性識行之慧是心差別智依緣所轉之諸法遍滿異性一性業之力深解慧是宿住隨念智依光曜之力見異性一性之色相義之慧是天眼智具六十四行相三根得自在之慧是漏盡智遍智義之慧是苦智斷義之慧是集智現證義之慧是滅智修習義之慧是道智有苦智苦集智苦滅智順苦滅道智有義無礙解智法無礙解智詞無礙解智辨無礙解智有根上下智有情意樂意趣智有對偶示導智有成大悲智有一切智智有無障智如是有七十三智此等七十三智中六十七智是共於聲聞六智是不共於聲聞
