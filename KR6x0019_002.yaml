味各別見而為味此名為味見味見是邪見邪見是見壞具此見壞之人是壞見不可依附壞見人不可親近不可敬奉此依何之因其人之見惡故見貪非是見見非是貪見與貪各別見而為貪此名為見貪具此見與貪是見貪所染之人布施與見貪所染之人無大果無大功德此依何之因其人之見惡故味見是邪見於邪見人有二趣地獄或傍生趣隨邪見人之見成受身業乃至語業隨見成受意業思希求願及諸行等一切諸法是資於非可愛非可親非適意不利益苦此依何之因其人之見惡故譬如拈筏種子或拘舍怛祇種子或苦葫蘆種子置潤地時其執受地之味其執受水之味是皆資於此苦性辛性不實性此依何之因其種子為惡之故如是隨邪見人之見成受身業乃至語言隨見成受意業思希求欲及諸行等一切諸法是資於非可愛非可親非適意不利益苦此依何之因其人之見惡故味見是邪見邪見是成見見稠林見曠野見諍見惱見詰見箭見害見障礙乃至見取見纏心之合有如是十八行相一八結而亦有為見結而亦有不為見如何結而亦為見有身見與戒禁取見此等結而亦為見如何結而亦不為見欲貪結瞋結慢結疑結有貪結嫉結慳結隨眠結無明結此等是結而亦非見於味見在現貪有如是三十五行相一九於隨我見現貪如何有二十行相於此處未聽聞之異生乃未見聖者不明解聖法不調順於聖法不見善士不明解善士之法不調順於善士之法由我觀見色或我有色或色於我或於色觀見我由我觀見受乃至想乃至諸行乃至或依我而觀見識或我有識或識於我或於識觀見我二如何是由我觀見色於此處有者由我觀見地遍地遍是此我我是此地遍觀見地遍與我為不二譬如油燈之燃時焰是此色色是此焰觀見焰與色為不二如是於此處有者由我觀見地遍地遍是此我我是此地遍觀見地遍與我為不二現貪取見是見見非是事事非是見見與事為各別見而亦為事此為初色事隨我見隨我見是邪見邪見是見壞隨我見是邪見於邪見人有二趣乃至此等是結而亦非見於此處有者由我觀見水遍乃至火遍乃至風遍乃至青編乃至黃遍乃至赤遍乃至白遍白遍是此我我是此白遍與乃至此等是結而非見如是而由我觀見色二一如何而觀見我是有色於此處有者由我而觀見受想行識於彼生如是念此是豫之我此豫之我是復具此色而有色觀見我有色譬如有樹具影有人如是應謂此是樹此是影樹與影各別而此樹具此影而有影則觀見樹有影如是於此處有者由我而觀見受想行識彼生如是念此是豫之我此豫之我是復具此色而有色則觀見我有色現貪取見是見見非是事事非是見見與事各別見而為事此為第二色事隨我見隨我見是邪見邪見是見壞乃至此等是結而非見如是觀見我有色二二如何而於我觀見色於此處有者由我觀見受想行識於彼生如是念此是豫之我而於此之我有此之色而於我觀見色譬如有華而具香有人如是應謂此是華此是香華與香各別而於此華有此香而於華觀見香如是於此處有者由我觀見受乃至識於彼生如是念此是豫之我而於此之我有此之色而於我觀見色現貪取見是見乃至此為第三色事隨我見乃至此等是結而非見如是而於我觀見色二三如何而於色觀見我於此處有者由我觀見受想行識於彼生如是念此是豫之我此色中有此豫之我而於色觀見我譬如有寶珠安置於篋中有人如是謂此是寶珠此是篋寶珠與篋而各別而此寶珠在此篋中而於篋中觀見寶珠如是於此處有者由我而觀見受乃至識於彼生如是念此是豫之我而此豫之我有此色而於色觀見我現貪取見是見乃至此為第四色事隨我見乃至此等是結而非見如是而於色觀見我二四如何而由我觀見受於此處有者由我觀見眼觸所生之受乃至耳觸所生之受乃至鼻觸所生之受是我乃至舌觸所生之受乃至身觸所生之受乃至意觸所生之受意觸所生之受此是我我是此意觸所生之受觀見意觸所生之受與我為不二譬如觀見油燈之乃至為不二如是於此處有者由我觀見意觸所生之受意觸所生之受此是我我是此意觸所生之受觀見意觸所生之受與我為不二現貪取見是見乃至此是初受事隨我見乃至此等是結而非見如是而由我觀見受二五如何觀見我而有受於此處有者由我觀見想行識色於彼生如是念此是豫之我此豫之我是復具此受而有受而觀見我有受譬如有樹乃至此等是結而非見如是觀見我而有受二六如何於我觀見受於此處有者由我觀見想乃至由我觀見色於彼生如是念此是豫之我而於此我有此受而於我觀見受譬如有華乃至此等是結而非見如是於我觀見受二七如何於受觀見我於此處有者由我觀見想乃至由我觀見色於彼生如是念此是豫之我於此豫之我有此之受而於受觀見我譬如有寶珠乃至此等是結而非見如是於受觀見我二八如何由我觀見想於此處有者由我觀見眼觸所生之想乃至由我觀見意觸所生之想觀見意觸所生之受乃至為不二譬如油燈之乃至此等是結而非見如是而由我觀見想二九如何觀見我有想於此處有者由我為觀見行乃至由我觀見受於彼生如是念此是豫之我此豫之我是復具此之想而有想而觀見我為有想譬如有樹乃至此等是結而非見如是觀見有想我三如何於我觀見想於此處有者由我觀見行乃至由我觀見受於彼生如是念此是豫之我而於此我有此之色而於我觀見色譬如有華乃至此等是結而非見如是我於觀見想三一如何於想觀見我於此處有者由我觀見行乃至由我觀見受於彼生如是念此是豫之我此豫之我是有此想而於想觀見我譬如有寶珠乃至此等是結而非