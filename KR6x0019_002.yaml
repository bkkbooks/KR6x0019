觀乃至於預流道乃至於一來道乃至於不還道乃至於阿羅漢道是如何是初如何是中如何是後於阿羅漢道之清淨是初捨之增長是中慶喜是後一八於阿羅漢道道之清淨是初於此初有幾何之相於初有三相由其處存阻害而心清淨依已清淨心入中之寂止相依已入於其處是躍進心即由阻害清淨心心已依清淨入中之寂止相依已入於其處是躍進心於阿羅漢道道之清淨是初於此初有如是三相故曰阿羅漢道是初善亦是相具足一九於阿羅漢道捨之增長是中於此中有幾何之相於中有三相觀察清淨心觀察入寂止心觀察一性近住之心即觀察清淨心相觀察入寂止心相觀察一性近住之心相於阿羅滿道捨之增長是中於此中有如是之三相故曰阿羅漢道是中善亦是相具足二於阿羅漢道慶喜是後於此後有幾何之相於後有四相依於其處所生諸法不超越之義而有慶喜依諸根一味之義而有慶喜依彼所生精進促進之義而有慶喜依習之義而有慶喜於阿羅漢道慶喜是後於此後有如是四相故曰阿羅漢道是後善亦是相具足如是三轉之心是三善十相具足尋具足伺具足善具足樂具足心攝持具足信具足精進具足念具足定具足慧具足二一因相入息出息乃非於一心之所緣不知此之三法者不得修習因相入息出息乃非於一心之所緣知此之三法者得修習二二此之三法非一心之所緣非不知此三法而心不散亂了知精勤成立加行證得殊勝者如何譬如有樹被橫於平地有人以鋸欲斫之依樹為鋸齒所觸故於人念近住不作意鋸齒之來去而且非不知鋸齒之來去了知精勤成立加行證得殊勝由合生之因相如樹被橫於平地入出息如鋸齒比丘或於鼻頭或於顏面令近住念而坐不作意入出息之來去而亦非不知入出息之來去了知精勤成立加行證得殊勝依如樹被鋸齒之觸故人念近住而不為作意鋸齒之來去而亦非不知鋸齒之來去了知精勤成立加行證得殊勝二三如何是精勤於有發勤者身心俱堪任此之是精勤如何是加行於有發勤者斷隨煩惱令尋思寂滅此是加行如何是殊勝於有發勤者斷結離隨眠此是殊勝如是此之三法非一心之所緣非不知此之三法而心不散亂了知精勤了知加行證得殊勝二四出息念如佛說精進圓滿善修習次第攝持遍熟者離雲如月照此世入息者是入息非是出息出息者是出息非是入息依入息力近住是念依出息力近住是念行入息者是念近住行出息者是念近住圓滿者依攝受之義而圓滿依伴屬之義而圓滿依圓滿之義而圓滿善修習者修習有四依於其處生諸法不超越之義是修習依諸根一味之義是修習依彼所生精進促進之義是修習依習之義是修習此人以此四修習之義乘作實作隨成遍熟令善造作二五乘作於欲求處則得自在得力得無畏於人此之諸法是傾心所繫欲求所繫作意所繫四句所繫故云是乘作實作者心善攝持於實事令念善安立念善安立於實事心善攝持故云是實作隨成者心所引發念隨轉念之所隨轉心引發故云隨成遍熟者依攝受之義是遍熟依伴屬之義是遍熟依圓滿之義是遍熟以念攝受者征服惡不善法故云遍熟善造作者善造作有四依於其處所生諸法不超越之義是善造作依諸根一味之義是善造作依彼所生精進促進之義是善造作依其敵家善永斷諸煩惱是善造作蘇三麼者有三麼有蘇三麼如何是三麼於其處生無呵責善覺分此是三麼如何是蘇三麼各各法之所緣滅涅槃此是蘇三麼如是而知見解現證觸接了知已發勤而不怠念近住而不忘身輕安而無忿心得定而一境故云善造作二六次第遍熟者依長入息之力於前前遍熟於後後隨遍熟依長出息之力於前前遍熟於後後隨遍熟依短入息之力於前前遍熟於後後隨遍熟依短出息之力於前前遍熟於後後隨遍熟乃至有定棄觀者依入息之力於前前遍熟於後後隨遍熟有定棄觀者依出息之力於前前遍熟於後後隨遍熟此等十六事之入出息念悉相互遍熟且隨遍熟故云次第遍熟二七如者如義有十自調伏之義是如義自寂止之義是如義自導般涅槃之義是如義通智之義是如義遍智之義是如義斷之義是如義修習之義是如義現證之義是如義聖諦現觀之義是如義令住於滅之義是如義二八佛者是世尊自然於未曾聞之法自現等覺聖諦於彼得一切智性於諸力自在佛者依何義而為佛乃聖諦之覺者故是佛為生類之令悟者故是佛依一切智性故是佛依一切已見性故是佛依他不能導性故是佛依已脫性故是佛依漏盡之類故是佛依無依之類故是佛一向離貪故是佛一向離瞋故是佛一向離癡故是佛一向無煩惱故是佛行一行道故是佛使現等覺無上正等覺唯一者故是佛覺不損而獲得覺故是佛云佛之此名非母之所造非父之所造非兄弟之所造非姊妹之所造非厚友之所造非親戚之所造非沙門婆羅門之所造非諸天之所造於此解脫之邊諸佛世尊於菩提樹下獲得一切智智而俱生真實之語言即云是佛二九說法是自調伏之義如義乃如佛之所說自寂滅之義如義乃佛之所說自導涅槃之義如義乃如佛之所說乃至令住於滅之義如義乃如佛之所說遍熟者云或居家或出家世者是蘊世界世處世敗有世敗生世成有世成生世有一世一切有情乃依食而住乃至有十八世是十八界三照者自調伏之義現等覺如義光輝照此世自寂止之義現等覺如義光輝照此世自導般涅槃之義現等覺如義光輝照此世乃至令住於滅之義現等覺如義光輝照此世三一如月之離雲者煩惱猶如雲聖智猶如月比丘猶如月天子月以離雲離霧離煙塵脫羅睺之執障光輝遍照比丘亦脫一切煩惱光輝遍照故云離雲如月以上是十三清淨智第二誦品三二如何是三十二作念智於此處比丘或往阿蘭若或往樹下或往空屋結跏趺坐端正持身普前令近住念如斯或念入息或念出息長入息了知我長入息長出息了知我長出息短入息了知我短入息短出息了知我短出息當學覺我遍身入息當學覺我遍身出息當學我入息止身行當學我出息止身行當學我覺喜乃至我覺樂乃至覺心行乃至止心行乃至覺心乃至令心歡喜乃至令心得定乃至令心解脫乃至觀無常乃至觀離貪乃至觀滅盡乃至我入息觀定棄當學我出息觀定棄三三此處者是於此見此忍此喜此攝持此法此律此法律此教此梵行此師教故云此處比丘者或善異生或有學之比丘或法不動之阿羅漢阿蘭若者出於門限之外處皆是阿蘭若樹下者為比丘設座或床或小床或褥或筵或皮片或草敷具或葉敷具或藁敷具之處比丘或徑行或立或坐或臥空者是居家或出家之不充滿屋者是舍半屋房樓房洞結跏趺坐者是足盤跏趺而坐之事端正持身正身善持立令普前近住念普是攝持之義前是出離之義念是近住之義故云令普前近住念三四念入息或念出息者作念三十二行相即依長入息之力了知心之一境性無散亂者則念近住此念此智而作念依長出息之力心一境性乃至作念依短入息之力心一境性乃至作念乃至觀定棄依入息之力乃至觀定棄依出息之力心一境性乃至作念三五長入息而了知我長入息長出息而了知我長出息者如何於長時之類入息以長入息於長時之類出息以長出息於長時之類入出息以長入出息於長時之類入出息以長入出息者志欲生依志欲之力於長時之類入息以較前者更微細之長入息依志欲之力於長時之類出息以較前者更微細之長出息依志欲之力於長時之類入出息以較前者更微細之長入出息依志欲之力於長時之類入出息以較前者更微細之長入出息者勝喜生依勝喜之力於長時之類入息以較前者更微細之長入息依勝喜之力於長時之類出息以較前者更微細之長出息依勝喜之力於長時之類入出息以較前者更微細之長入出息者由長入出息心退轉而捨住如是依有九行相之長入出息身是近住念是隨觀智身之近住乃非念念近住而自念此念依此智隨觀此身故曰於身隨觀身即是念處之修習三六隨觀者如何而隨觀此身由無常隨觀而不由常由苦隨觀而不由樂由無我隨觀而不由我由厭惡而不歡喜由離貪而不貪令滅而不令集定棄而不執取由無常隨觀以斷常想由苦隨觀以斷樂想由無我隨觀以斷我想厭惡以斷歡喜離貪以斷貪使滅以斷集定棄以斷執取如是而為隨觀此身修習者修習有四依於其處生諸法不超越之義是修習依諸根一味之義是修習依彼所生精進促進之義是修習依習之義是修習三七依長入出息之力了知心之一境無散亂者是悟受之生悟近住悟滅悟想之生悟近住悟滅悟尋之生悟近住悟滅三八如何而悟受之生悟近住悟滅如何而悟受之生由無明之集而有受之集依緣之集之義而悟受之生由渴愛之集而有受之集乃至由業之集而有受之集乃至由觸之集而有受之集依緣集之義而悟受之生見成相而悟受之集如是而悟受之生如何而悟受之近住由無常作意而悟滅盡近住由苦作意而悟怖畏近住由無我作意而悟空性近住如是而悟受之近住如何而悟受之滅依無明之滅而有受之滅依緣滅之義悟受滅依渴愛之滅有受滅乃至依業之滅有受之滅乃至依觸之滅有受之滅依緣滅之義悟受滅見壞相悟受滅如是而悟受之滅如是而悟受之生悟近住悟滅三九如何而悟想之生悟近住悟滅如何而悟想之生由無明之集而有想之集依緣集之義悟想生由渴愛之集而乃至見成相悟想之生如是而悟想之生如何而悟想之近住由無常而作意乃至悟空性近住如是而悟想之近住如何而悟想之滅依無明之滅而有想之滅乃至見壞相悟想之滅如是而悟想之滅如是而悟想之生悟近住悟滅四如何而悟尋之生悟近住悟滅如何而悟尋之生由無明之集而有尋之集依緣集之義而悟尋之生由渴愛之集而乃至見成相而悟尋之生如何悟尋之近住由無常而作意乃至悟空性近住如是為悟尋之近住如何而悟尋之滅依無明之滅而有尋之滅乃至見壞相而悟尋之滅如是而悟尋之滅如是而悟尋之生悟近住悟滅四一依長入出息之力了知心之一境性無散亂者通達力了知攝五根行境乃至通達能力了知攝諸法行境攝五根者如何而攝五根依勝解之義攝信根依精勤之義攝精進根依近住之義攝念根依無散亂之義攝定根依見之義攝慧根此人於此所緣攝此五根故云攝五根了知行境此人之所緣是此人之行境此人之所緣了知是此人之行境此之人以慧了知等者所緣之近住是等心之無散亂是等心之攝持是等心之清淨是等義者無呵責之義無煩惱之義清淨之義是勝義通達者通達所緣之近住通達心無散亂之義通達心攝持之義通達心清淨之義故云通達能力四二攝五力如何而攝五力依於不信之不動義攝信力依於懈怠之不動義攝精進力依於放逸之不動義攝念力依於掉舉之不動義攝定力依於無明之不動義攝慧力此人於此所緣攝此之五力故云攝此五力了知行境乃至故云通達能力四三攝七覺支如何而為攝七覺支依近住之義攝念覺支依思擇之義攝擇法覺支依精勤之義攝精進覺支依遍滿之義攝喜覺支依寂止之義攝輕安覺支依無散亂之義攝定覺支依簡擇之義攝捨覺支此人於此所緣攝此之七覺支故云攝七覺支了知行境乃至故云通達能力四四攝八聖道如何而為攝八聖道依見之義攝正見依現前解之義攝正思惟依攝