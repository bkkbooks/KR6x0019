是此法令遍知且令度為獲得無瞋故而精進者已獲得其無瞋如是此法令遍知且令度為獲得光明想故乃至且令度為獲得無散亂故乃至且令度為獲得法決定故乃至且令度為獲得智故乃至且令度為獲得勝喜故乃至且令度六為獲得初靜慮故乃至且令度為獲第二靜慮故乃至且令度為獲得第三靜慮故乃至為獲得第四靜慮故乃至且令度為獲得虛空無邊處定故乃至且令度為獲得識無邊處定故乃至且令度為獲得無所有處定故乃至且令度為獲得非想非非想處定故乃至且令度六一為獲得無常觀故乃至且令度為獲得苦觀故乃至且令度為獲得無我觀故乃至且令度為獲得涅槃觀故乃至且令度為獲得離貪觀故乃至且令度為獲得滅觀故乃至且令度為獲得定棄觀故乃至且令度為獲得盡觀故乃至且令度為獲得衰觀故乃至且令度為獲得變壞觀故乃至且令度為獲得無因相觀故乃至且令度為獲得無願觀故乃至且令度為獲得空性觀故乃至且令度六二為獲得增上慧法之正觀故乃至且令度為獲得如實知見故乃至且令度為獲得過患觀故乃至且令度為獲得簡擇觀故乃至且令度為獲得退轉觀故乃至且令度六三為獲得預流道故乃至且令度為獲得一來道故乃至且令度為獲得不還道故乃至且令度為獲得阿羅漢道故而精進者已獲得阿羅漢道如是而遍知此法且令度凡為諸法之獲得故而精進者已獲得其諸法如是其諸法令遍知且令度此依所知之義是智依其了知義是慧故曰應遍知此等諸法是聽聞以其了知之慧是聞所成智六四云應斷此等諸法是聽聞以其了知之慧是聞所成智者如何應斷一法是言我慢應斷二法是言無明與有愛應斷三法是言三愛應斷四法是言四暴流應斷五法是言五蓋應斷六法是言六愛身應斷七法是言七隨眠應斷八法是言八邪性應斷九法是言九愛根應斷十法是言十邪性六五斷有二是言斷斷與止斷斷斷者是修習順出世間滅盡者之斷止斷者是獲果剎那之斷斷有三是言斷諸欲是離即出離離諸色即無色有有為緣已生之滅是離也獲得出離者是斷諸欲且永捨獲得無色者是斷諸色且永捨獲得滅者是斷諸行且永捨斷有四是言通達遍智通達而斷苦諦通達斷通達而斷集諦通達現證通達而斷滅諦通達修習通達而斷道諦斷有五是言消除斷決定斷斷斷止斷及出離斷消除斷者乃修習初靜慮者云斷五蓋決定斷者乃修習順決擇分之定云斷成見斷斷者乃修習順出世間滅盡道者之斷止斷者乃獲果剎那之斷出離斷者乃滅即涅槃六六諸比丘應斷一切諸比丘應斷一切者如何諸比丘應斷眼應斷諸色應斷眼識應斷眼觸即應斷以眼觸為緣所生受之或樂或苦或不苦不樂應斷耳應斷諸聲乃至應斷鼻應斷諸香乃至應斷舌應斷諸味乃至應斷身應斷諸所觸乃至應斷意應斷諸法應斷意識應斷意觸即應斷以意觸為緣所生受之或樂或苦或不苦不樂斷見色斷見受斷見想斷見諸行斷見識斷見眼乃至老死乃至依盡際之義見斷而入不死涅槃凡所斷之諸法悉被永捨此依所知之義是智依其了知之義是慧故曰應斷此等諸法是聽聞以其了知之慧是聞所成智第四誦品六七云應修習此等諸法是聽聞以其了知之慧是聞所成智者如何應修習一法是言喜悅俱行之身念應修習二法是言寂止與正觀應修習三法是言三三摩地應修習四法是言四念住應修習五法是言五支正定應修習六法是言六隨念處應修習七法是言七覺支應修習八法是言八支聖道應修習九法是言九精進致淨支應修習十法是言十遍處六八修習有二是言世間修習與出世間修習修習有三是言色纏善法之修習無色纏善法之修習及非所攝善法之修習色纏善法之修習有劣有中有勝無色纏善法之修習有劣有中有勝非所攝善法之修習則是常勝修習有四是言通達遍智通達而修習苦諦通達斷通達而修習集諦通達現證通達而修習滅諦通達修習通達而修習道諦此是四修習六九次又修習有四是言尋求修習獲得修習一味修習及習修習何為尋求修習是言凡修定者於其時所生諸法是一味此是尋求修習何為獲得修習是言凡已修定者於其時所生諸法相互不超越此是獲得修習七何是一味修習是言依勝解之義修習信根者依信根之力故其他之四根是一味依四根一味之義而修習云依精勤之義修習精進根者依精進根之力故其他四根是一味依四根一味之力而修習云依近住之義修習念根者乃至是一味乃至而修習云依無散亂之義修習定根者乃至是一味乃至是修習云依見之義修習慧根者乃至是一味乃至而修習云於不信依不動義修習信力者依信力之力故其他四力是一味依四力一味之義而修習云於懈怠依不動之義修習精進力者乃至是一味乃至而修習云於放逸依不動之義修習念力者乃至是一味乃至而修習云於掉舉依不動之義修習定力者乃至是一味乃至而修習云於無明依不動之義修習慧力者乃至是一味乃至而修習云依近住之義修習念覺支者依念覺支之力故其他之六覺支是一味依六覺支一味之義而修習云依思擇之義修習擇法覺支者乃至是一味乃至而修習云依精進之義修習精進覺支者乃至是一味乃至而修習云依遍滿之義修習喜覺支者乃至是一味乃至而修習云依寂靜之義修習輕安覺支者乃至是一味乃至而修習云依無散亂之義修習定覺支者乃至是一味乃至而修習依簡擇之義修習捨覺支者乃至是一味乃至而修習云依見之義修習正見者依正見之力故其他之七道支是一味依七覺支一味之義而修習云依現前解之義修習正思惟者乃至是一味乃至而修習云依攝受之義修習正語者乃至是一味乃至而修習云依等起之義修習正業者乃至是一味乃至而修習云依清淨之義修習正命者乃至是一味乃至而修習云依精勤之義修習正精進者乃至是一味乃至而修習云依近住之義修習正念者乃至是一味乃至而修習云依無散亂之義修習正定者依正定力故其他之七道支是一味依七覺支一味之義而修習此是一味修習七一如何是習修習此處比丘於早晨時亦習於日中時亦習於黃昏時亦習於早餐亦習於初夜亦習於中夜亦習於後夜亦習夜分亦習晝分亦習晝夜亦習於黑半月亦習於白半月亦習雨期亦習冬季亦習夏期亦習年初期亦習年中期亦習年後期亦習此為習修習以上為四修習七二次又有四修習依於其處所生之諸法不超越義而修習依諸根之一味義而修習依由其所生促進精進之義而修習依習之義而修習七三如何依其處所生之諸法不超越義而修習云依出離之力斷欲欲者所生諸法是相互不超越依其處所生之諸法不超越義而修習云依無瞋之力斷瞋者所生之諸法相互不超越依其處所生之諸法不超越義而修習云依光明想之力斷惛眠者乃至不超越乃至而修習云依無散亂之力斷掉舉者乃至不超越乃至而修習云依法決定之力斷疑者乃至不超越乃至而修習云依智之力斷無明者乃至不超越乃至而修習云依勝喜之力斷不欣喜者乃至不超越乃至而修習云依初靜慮之力斷五蓋者乃至不超越乃至而修習云依第二靜慮之力斷尋伺者乃至不超越乃至而修習云依第三靜慮之力斷喜者乃至不超越乃至而修習云依第四靜慮之力斷樂苦者乃至不超越乃至而修習云依虛空無邊處定之力斷色想有對想種種想者乃至不超越乃至而修習云依識無邊處定之力斷虛空無邊處想者乃至不超越乃至而修習云依無所有處定之力斷識無邊處想者乃至不超越乃至而修習云依非想非非想處定之力斷無所有處想者乃至不超越乃至而修習云依無常觀之力斷常想者乃至不超越乃至而修習云依苦觀之力斷樂想者乃至不超越乃至而修習云依無我觀之力斷我想者乃至不超越乃至而修習云依厭惡觀之力斷歡喜者乃至不超越乃至而修習云依離貪觀之力斷貪者乃至不超越乃至而修習云依滅觀之力斷集者乃至不超越乃至而修習云依定棄觀之力斷執取者乃至不超越乃至而修習云依盡觀之力斷厚想者乃至不超越乃至而修習云依衰觀之力斷存續者乃至不超越乃至而修習云依變壞觀之力斷堅固想者乃至不超越乃至而修習云依無因相觀之力斷因相者乃至不超越乃至而修習云依無願觀之力斷願者乃至不超越乃至而修習云依空性觀之力斷現貪者乃至不超越乃至而修習云依增上慧法正觀之力斷堅執現貪者乃至不超越乃至而修習云依如實智見之力斷迷妄現貪者乃至不超越乃至而修習云依過患觀之力斷執著現貪者乃至不超越乃至而修習云依簡擇觀之力斷無簡擇者乃至不超越乃至而修習云依退轉觀之力斷合現貪者乃至不超越乃至而修習云依預流道之力斷見同位之煩惱者乃至不超越乃至而修習云依一來道之力斷粗之諸煩惱者乃至不超越乃至而修習云依不還道之力斷細之諸煩惱者乃至不超越乃至而修習云依阿羅漢道之力斷一切煩惱者所生諸法相互不超越依其處所生之諸法不超越義而修習以上依其處所生之諸法不超越義而修習七四如何依諸根一味之義而修習云依出離之力斷欲欲者而五根是一味依諸根一味之義而修習云依無瞋之力斷瞋者而五根是一味依諸根一味之義而修習乃至云依阿羅漢道之力斷一切煩惱者而五根是一味依諸根一味之義而修習以上依諸根一味之義而修習七五如何依其處所存促進精進之義而修習云依出離之力斷欲欲者促進精進依其處所存促進精進之義而修習云依無瞋之力斷瞋促進精進依其處所存促進精進之義而修習乃至云依阿羅漢道之力斷一切煩惱者促進精進依其處所存促進精進之義而修習以上依其處所存促進精進之義而修習七六如何依習之義而修習云斷欲欲者習出離依習之義而修習斷瞋者習無瞋依習之義而修習乃至斷一切煩惱者習阿羅漢道依習之義而修習以上依習之義而修習以上為四修習見色而修習見受而修習見想而修習見諸行而修習見識而修習見眼而修習乃至老死乃至依見盡際之義於不死入涅槃而修習凡修習諸法悉皆一味此依所知之義智依了知之義慧故曰應修習此等諸法是聽聞以其了知之慧是聞所成智第五誦品七七云應現證此等諸法是聽聞以其了知之慧是聞所成智者如何應現證一法是言不動之心解脫應現證二法是言明與解脫應現證三法是言三明應現證四法是言四沙門果應現證五法是言五法蘊應現證六法是言六神通應現證七法是言七漏盡力應現證八法是言八解脫應現證九法是言九次第滅應現證十法是言十無學法七八諸比丘應現證一切諸比丘應現證一切者如何諸比丘應現證眼應現證諸色應現證眼識應現證眼觸即應現證以眼觸為緣所生受之或樂或苦或不苦不樂應現證耳應現證聲乃至應現證鼻應現證諸香乃至應現證舌應現證諸味乃至應現證身應現證諸所觸乃至應現證意應現證諸法應現證意識應現證意觸即應現證以意觸為緣所生受之或樂或苦或不苦不樂現證見色現證見受現證見想現證見諸行現證見識現證見眼乃至老死乃至依盡際之義現證見入於不死涅槃凡所現證諸法悉皆到達此依所知義是智依了知義是慧故曰應現證此等諸法是聽聞以其了知之慧是聞所成智云此等諸法是順退分此等諸法是順住分此等諸法是順勝進分此等諸法是順決擇分是聽聞以其了知之慧是聞所成智者如何對獲得初靜慮者作意欲之俱行想為現行此是順退分之法隨順彼法為念住此是順住分之法作意無尋之俱行想為現行此是順勝進分之法作意厭惡之俱行想為現行而伴隨離貪此是順決擇分之法對獲得第二靜慮者作意尋之俱行想為現行此是順退分之法隨順彼法為念住此是順住分之法作意捨樂之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法對獲得第三靜慮者作意喜樂之苦行想現行此是順退分之法隨順此法為念住此是順住分之法作意不苦不樂之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法對獲得第四靜慮者作意捨樂之俱行想為現行此是順退分之法隨順此法為念住此是順住分之法作意虛空無邊處之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法對獲得虛空無邊處者作意色之俱行想為現行此是順退分之法隨順此法為念住此是順住分之法作意識無邊處之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法對獲得識無邊處者作意虛空無邊處之俱行想為現行此是順退分之法隨順此法為念住此是順住分之法作意無所有處之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法對獲得無所有處者作意識無邊處之俱行想為現行此是順退分之法隨順此法為念住此是順住分之法作意非想非非想之俱行想為現行此是順勝進分之法作意厭惡之俱行想現行為伴隨離貪此是順決擇分之法此依所知義是智依了知義是慧故曰此等諸法是順退分此等諸法是順住分此等諸法是順勝進分此等諸法是順決擇分是聽聞以其了知之慧是聞所成智七九云一切諸行是無常一切諸行是苦一切諸行是無我是聽聞以其了知之慧是聞所成智者如何云色依滅盡之義是無常依滅盡之義是苦依不堅固之義是無我是聽聞以其了知之慧是聞所成智云受想諸行識眼乃至老死依滅盡之義是無常依滅盡之義是苦依不堅固之義是無我是聽聞以其了知之慧是聞所成智此依所知之義是智依了知之義是慧故曰一切諸行是無常一切諸行是苦一切諸行是無我是聽聞以其了知之慧是聞所成智八此是苦之聖諦此是苦集之聖諦此是苦滅之聖諦此是順苦滅道之聖諦是聽聞以其了知之慧是聞所成智者如何此中如何是苦之聖諦是言生是苦老是苦死是苦愁悲苦憂惱是苦怨憎會是苦愛別離是苦求而不得是苦略說五取蘊是苦此中如何為生各各之有情於各各有情聚而生出生生成生起五蘊興起而獲得十二處此名為生此中如何為老各各之有情於各各有情聚而老老耄齒落白頭皮緩皺盛壯向衰諸根毀熟此名為老此中如何為死各各之有情於各各有情聚而隱沒下生散滅消滅死喪命盡五蘊離散破棄身體命根閉塞此名為死八一此中如何為愁若蒙親屬損滅若蒙財富損滅若蒙病損滅若蒙戒損滅若蒙見損滅若具隨一損滅蒙隨一苦法者之愁憂愁愁愁內愁內遍愁心之苦惱憂愁痛此名為愁此中如何為悲若蒙親屬損滅若蒙財富損滅若蒙病損滅若蒙戒損滅若蒙見損滅若具隨一損滅蒙隨一苦法者之痛哭悲痛痛嘆悲嘆痛痛悲悲叫泣號泣慟哭大哭叫哭此名為悲此中如何為苦身不喜悅是身之苦身觸所生不喜悅之所受是苦身觸所生不喜悅之受是苦此名為苦此中如何為憂心不喜悅是心苦心觸所生不喜悅之所受是苦心觸所生不喜悅之受是苦此名為憂此中如何為惱若蒙親屬損滅若蒙財富損滅若蒙病損滅若蒙戒損滅若蒙見損滅若具隨一損滅蒙隨一苦法者之苦惱懊惱憂惱愁惱痛惱大惱此名為惱八二此中如何為怨憎會苦此處凡對其人採取非可愛非可親非適意色聲香味所觸若欲其人之不利得不利益不適悅不安穩者等與之會合俱會遭遇相合此名為怨憎會苦此中如何為愛別離苦此處凡對其人採取可愛可親適意色聲香味所觸若欲其人利得利益適悅安穩或母或父或兄弟或姊妹或厚友或親友或親屬或親戚等與之不會合不俱會不遭遇不相合此名為愛別離苦此中何謂求而不得苦於有生法之有情欲望如是生嗟我等不希生法嗟希不受生然對此欲望不適於有老法之有情乃至於有病法之有情乃至於有死法之有情乃至有愁悲苦憂惱法之有情生如是欲望嗟我等希無有愁悲苦憂惱法嗟希不受愁悲苦憂惱然對此欲望不適此名為求而不得苦如何為略說五取蘊是苦即色取蘊受取蘊想取蘊行取蘊識取蘊此等名為略說五取蘊是苦以上名為苦之聖諦八三此中如何為苦集之聖諦此處渴愛生後有喜貪俱行而隨處歡喜即欲愛有愛無有愛復次此渴愛於何處生於何處住且住於世間為喜悅者此渴愛生且生住且住復次如何於世間是喜悅眼於世間是喜悅此處此渴愛生且生住且住耳於世間乃至鼻於世間乃至舌於世間乃至身於世間乃至意於世間是喜悅此處此渴愛生且生住且住諸色於世間是喜悅此處此渴愛生且生住且住諸聲於世間是喜悅乃至諸法於世間是喜悅乃至眼識於世間乃至意識於世間乃至眼觸所生之受於世間乃至意觸所生之受於世間乃至色想於世間乃至法想於世間乃至色思於世間乃至法思於世間乃至色愛於世間乃至法愛於世間乃至色尋於世間乃至法尋於世間乃至色伺於世間乃至法伺於世間是喜悅此處此渴愛生且生住且住以上名為苦集之聖諦八四此中如何為苦滅之聖諦此渴愛悉皆離滅捨離定棄解脫無執復次此渴愛於何處被斷且被斷被滅且被滅於世間為喜悅者此渴愛被斷且被斷被滅且被滅復次如何於世間是喜悅眼於世間是喜悅於此處此渴愛被斷且被斷被滅且被滅乃至法伺於世間是喜悅於此處此渴愛被斷且被斷被滅且被滅以上名為苦滅之聖諦八五此中如何為順苦滅道之聖諦此即八支聖道即正見正思惟正語正業正命正精進正念正定此中如何為正見知苦知苦集知苦滅知順苦滅道此名為正見此中如何為正思惟思惟出離思惟無慎思惟無害此名為正思惟此中如何為正語離虛誑語離離間語離粗惡語離雜穢語此名為正語此中如何為正業離斷生命離不與取離欲邪行此名為正業此中如何為正命此處聖聲聞斷邪命依正命為命此名為正命此中如何為正精進此處比丘未生之惡不善法令不生故生志欲策勵發勤策心持心為已生之惡不善法令斷故乃至為令生未生之善法生故乃至為令住已生之善法不妄失倍修習廣修習為之圓滿故生志欲策勵發勤策心持心此名為正精進此中如何為正念此處比丘於身觀身而住精勤正知具念於世間應識貪憂於諸受乃至於心乃至於諸法觀法而住精勤正知具念於世間應識貪憂此名為正念此中如何為正定此處比丘離諸欲離諸不善法有尋有伺由離生喜樂具足初靜慮而住成尋伺之寂靜故內成淨心定為一趣無尋無伺由三摩地生喜樂具足第二靜慮而住由離喜故住於捨念為正知正受身樂如是捨而具念樂住具足聖者宣說之第三靜慮而住由斷樂並斷苦故且前已斷喜憂故不苦不樂而捨念清淨具足第四靜慮而住此名為正定以上名是順苦滅道之聖諦此依所知之義是智依了知之義是慧故曰此是苦之聖諦此是苦集之聖諦此是苦滅之聖諦此是順苦滅道之聖諦是聽聞以其了知之慧是聞所成智以上聽聞之慧是聞所成智第二章一聽聞後律儀之慧是戒所成智者如何戒有五是言有邊清淨戒無邊清淨戒圓滿清淨戒不惛昧清淨戒止滅清淨戒此中如何為有邊清淨戒未近圓而有有邊學處者此為有邊清淨戒如何為無邊清淨戒已近圓而有無邊學處者此為無邊清淨戒如何為圓滿清淨戒善異生而相應善法於有學之邊際成圓滿無顧慮身命永捨命者此為圓滿清淨戒如何為不惛昧清淨戒七有學此為不惛昧清淨戒如何為止滅清淨戒如來漏盡之聲聞獨覺及如來應供正等覺者此為止滅清淨戒二於戒有有邊於戒有無邊此中如何為有邊戒戒以利養為邊戒以稱譽為邊戒以親屬為邊戒以身分為邊戒以命為邊如何利養為邊之戒此處或者依利養之因利養之緣利養之因由犯所受之學處如是乃利養為邊之戒如何稱譽為邊之戒此處或者依稱譽之因稱譽之緣稱譽之因由犯所受之學處如是乃稱譽為邊之戒如何親屬為邊之戒此處或者依親屬之因親屬之緣親屬之因由犯所受之學處如是乃親屬為邊之戒如何身分為邊之戒此處或者依命之因命之緣命之因由犯所受之學處如是身分為邊之戒如何命為邊之戒此處或者依命之因命之緣命之因由犯所受之學處如是乃命為邊之戒如是諸戒為破缺穿壞錯雜間斷不具自在非不失惛昧而不資於定者非無追悔非勝喜事非喜事非輕安非樂事非定事非如實智見事非資於一向厭惡離貪滅寂靜通智正覺涅槃如是為有邊戒三如何為無邊戒於戒不以利養為邊於戒不以稱譽為邊於戒不以親屬為邊於戒不以身分為邊於戒不以命為邊如何不以利養為邊戒此處或者依利養之因利養之緣利養之因由不令生心為欲犯所受之學處況欲為犯如是乃不以利養為邊戒如何不以稱譽為邊戒此處或者依稱譽之因乃至乃不以稱譽為邊戒如何不以親屬為邊戒此處或者依親屬之因乃至乃不以親屬為邊戒如何不以身分為邊戒此處或者依身分之因乃至乃不以身分為邊戒如何不以命為邊戒此處或者依命之因命之緣命之因由不令生心為欲犯所受之學處況欲為犯如是乃不以命為邊戒如是諸戒乃無缺不穿不雜不間斷具自在不失不惛昧而資定無追悔事以勝喜為事以喜為事以輕安為事以樂為事以定為事以如實智見為事而資於一向厭惡離貪滅寂靜通智正覺涅槃如是為無邊戒四如何為戒戒有幾何戒依何等起戒攝幾何之法如何為戒思是戒心所是戒律儀是戒不犯是戒戒有幾何戒有三是善戒不善戒無記戒戒依何等起依善心等起是善戒依不善心等起是不善戒依無記心等起是無記戒戒攝幾何之法戒攝律儀戒攝不犯戒攝於如是者所生之思依斷生命律儀之義是戒依不犯之義是戒依不與取律儀之義是戒依不犯之義是戒依欲邪行律儀之義是戒依不犯之義是戒依虛誑語律儀之義是戒依不犯之義是戒依離間語律儀之義是戒依不犯之義是戒依粗惡語律儀之義是戒依不犯之義是戒依雜穢語律儀之義是戒依不犯之義是戒依貪律儀之義是戒依不犯之義是戒依瞋律儀之義是戒依不犯之義是戒依邪見律儀之義是戒依不犯之義戒依出離欲欲律儀之義是戒依不犯之義是戒依無瞋瞋之律儀是戒依不犯之義是戒依光明想惛沈睡眠之乃至依無散亂之義掉舉之乃至依法決定疑之乃至依智無明之乃至依勝喜不欣喜之乃至依初靜慮五蓋之乃至依第二靜慮尋伺之乃至依第三靜慮喜之乃至依第四靜慮樂苦之乃至依虛空無邊處定色想有對想種種想之乃至依識無邊處定虛空無邊處想之乃至依無所有處定識無邊處想之乃至依非想非非想處定無所有處想之乃至依無常觀常想之乃至依苦觀樂想之乃至依無我觀我想