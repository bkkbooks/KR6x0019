願勝解是妙勝解無諍住者初靜慮是無諍住第二靜慮是無諍住第三靜慮是無諍住第四靜慮是無諍住虛空無邊處定是無諍住乃至非想非非想處定是無諍住無諍住者依何義而是無諍住依初靜慮除五蓋故是無諍住依第二靜慮除尋伺故是無諍住依第三靜慮除喜故是無諍住依第四靜慮除樂苦故是無諍住依虛空無邊處定除色想有對想種種想故是無諍住依識無邊處定除虛空無邊處想故是無諍住依無所有處定除識無邊處想故是無諍住依非想非想處定除無所有處定故是無諍住如是乃是無諍住此依所知之義是智依了知之義是慧故曰見增上與寂靜得住之妙勝解慧是無諍住之智第二十五章一具二力止三行依十六智行與九三摩地行得自在之慧是漏盡定之智者如何二力是寂止力與正觀力二何者是寂止力依出離之力心一境性無散亂是寂止力依無瞋之力心一境性無散亂是寂止力依光明想之力心一境性無散亂是寂止力依無散亂之力心一境性無散亂是寂止力乃至依觀定棄者出息之力心一境性無散亂是寂止力三寂止力者依何義是為寂止力依初靜慮於五蓋不動故是寂止力依第二靜慮於尋伺不動故是寂止力依第三靜慮於喜不動故是寂止力依第四靜慮於樂苦不動故是寂止力依虛空無邊處定於色想無對想種種想不動故是寂止力依識無邊處定於虛空無邊處想不動故是寂止力依無所有處定於識無邊處想不動故是寂止力依非想非非想處定於無所有處定不動故是寂止力於掉舉與掉舉隨伴之煩惱蘊不動不震不漏故是寂止力如是乃為寂止力四何者是正觀力無常觀是正觀力苦觀是正觀力無我觀是正觀力厭惡觀是正觀力離貪觀是正觀力滅觀是正觀力定棄觀是正觀力於色無常觀是正觀力乃至於色定棄觀是正觀力於受乃至於想乃至於諸行乃至於識乃至於眼乃至於老死無常觀是正觀力乃至於老死定棄力是正觀力五正觀力依何義是正觀力依無常觀於常想不動故是正觀力依苦觀於樂想不動故是正觀力依無我觀於我想不動故是正觀力依厭惡觀於歡喜不動故是正觀力依離貧觀於貪欲不動故是正觀力依滅觀於集不動故是正觀力依定棄觀於執取不動故是正觀力無明與無明隨伴之煩惱與於蘊不動不震不涌故是正觀力如是乃為正觀力六止三行者何者是止三行成就第二靜慮者止尋伺之語行成就第四靜慮者止出入息之身行成就想所受滅者止想受之心行如是云三行之止七十六智行者何者是十六智行無常觀是智行苦觀是智行無我觀是智行厭惡觀是智行離貪觀是智行滅觀是智行定棄觀是智行退轉觀是智行預流道是智行得預流果是智行一來道是智行得一來果是智行不還道是智行得不還果是智行阿羅漢道是智行得阿羅漢果是智行如是是十六智行八九三摩地行者如何是九三摩地行初靜慮是三摩地行第二靜慮是三摩地行第三靜慮是三摩地行第四靜慮是三摩地行虛空無邊處定是三摩地行識無邊處定是三摩地行無所有處定是三摩地行非想非非想處定是三摩地行為獲得初靜慮故有尋伺喜樂心一境性乃至為獲得非想非非想處定故有尋伺喜樂心一境性如是是九三摩地行九自在者是五自在傾心自在等至自在攝持自在出離自在與觀察自在云如意應意隨意傾心初靜慮而傾心無有遲鈍是傾心自在云如意應意隨意等至初靜慮而等至無有遲鈍是等至自在云如意應意隨意攝持初靜慮而攝持無有遲鈍是攝持自在云如意應意隨意出離初靜慮而出離無有遲鈍是出離自在云如意應意隨意觀察初靜慮而觀察無有遲鈍是觀察自在云第二靜慮乃至如意應意隨意傾心非想非非想處定而傾心無有遲鈍是傾心自在云如意應意隨意等至非想非非想處定乃至攝持乃至出離乃至觀察而觀察無有遲鈍是觀察自在如是是五自在此依所知之義是智依了知之義是慧故曰具二力止三行依十六智行與九三摩地行得自在之慧是滅盡定之智第二十六章正知者永盡流轉之慧是般涅槃智者如何此處正知者依出離永盡欲欲之流轉依無瞋永盡瞋之流轉依光明想永盡惛眠之流轉依無散亂永盡掉舉之流轉依法決定永盡疑之流轉依智永盡無明之流轉依勝喜永盡不喜之流轉依初靜慮永盡五蓋之流轉乃至依阿羅漢道永盡一切煩惱之流轉復次正知者於無餘依涅槃界永盡此眼之流轉其他不生眼之流轉此耳之流轉乃至鼻之流轉乃至舌之流轉乃至身之流轉乃至永盡意之流轉而其他意之流轉不生如是正知者永盡流轉之慧是般涅槃之智此依所知之義是智了知之義是慧故曰正知者永盡流轉之慧是般涅槃之智第二十七章一一切諸法之正斷滅不近住性之慧是齊首義之智者如何一切諸法者是五蘊十二處十八界善法不善法無記法欲纏法色纏法無色纏法非所攝法二正斷者是依出離正斷欲欲依無瞋正斷瞋依光明想正斷惛眠依無散亂正斷掉舉依法決定正斷疑依智正斷無明依勝喜正斷不欣喜依初靜慮正斷五蓋乃至依阿羅漢道正斷一切煩惱三滅者是依出離滅欲欲依無瞋滅瞋依光明想滅惛眠依無散亂滅掉舉依法決定滅疑依智滅無明依勝喜滅不欣喜依初靜慮滅五蓋乃至依阿羅漢道滅一切煩惱四不近住者是獲得出離者不近住欲欲獲得無瞋者不近住瞋獲得光明想者不近住惛眠獲得無散亂者不近住掉舉獲得法決定者不近住疑獲得智者不近住無明獲得勝喜者不近住不欣喜獲得初靜慮者不近住五蓋乃至獲得阿羅漢道者不近住一切煩惱五三摩者乃已斷欲欲故出離是三摩已斷瞋故無瞋是三摩已斷惛眠故光明想是三摩已斷掉舉故無散亂是三摩已斷疑故法決定是三摩已斷無明故智是三摩已斷不欣喜故勝喜是三摩已斷五蓋故初靜慮是三摩乃至已斷一切煩惱故阿羅漢道是三摩六首者是十三首障礙之首是渴愛繫縛之首是無明勝解之首是信精勤之首是精進近住之首是念無散亂之首是定見之首是慧流轉之首是命根行境之首是解脫諸行之首是滅此依所知之義是智依了知之義是慧故曰一切諸法之正斷滅不近住性之慧是齊首義之智第二十八章一永盡別性異性一性威力之慧是漸損義之智者如何別性者乃貪是別性瞋是別性癡是別性忿是別性乃至恨是別性覆是別性惱是別性嫉是別性慳是別性諂是別性誑是別性傲是別性怒是別性慢是別性過慢是別性憍是別性放逸是別性一切煩惱是別性一切惡行是別性一切現行是別性一切順有業是別性二異性一性者欲欲是異性出離是一性瞋是異性無瞋是一性惛眠是異性光明想是一性掉舉是異性無散亂是一性疑是異性法決定是一性無明是異性智是一性不欣喜是異性勝喜是一性五蓋是異性初靜慮是一性乃至一切煩惱是異性阿羅漢道是一性三威力者有五威力乃行威力德威力慧威力福威力法威力依行威力已令服故永盡破戒威力依德威力已令服故永盡非德威力依慧威力已令服故永盡惡慧威力依福威力已令服故永盡非福威力依法威力已令服故永盡非法威力四漸損者欲欲是無漸損出離是漸損掉舉是無漸損無散亂是漸損疑是無漸損法決定是漸損無明是無漸損智是漸損不欣喜是無漸損勝喜是漸損五蓋是無漸損初靜慮是漸損乃至一切煩惱是無漸損阿羅漢道是漸損乃至一切煩惱是無漸損阿羅漢道是漸損此依所知之義是智依了知之義是慧故曰永盡別性異性一性是漸損義之智第二十九章一依不怠持心精勤義之慧是發勤之智者如何為未生之惡不善法令不生故依不怠持心精勤義之慧是發勤之智為己生之惡不善法令斷故依不怠持心精勤義之慧是發勤之智為未生之善法令生故依不怠持心精勤義之慧是發勤之智為已生之善法令住不妄失倍修習廣修習圓滿故依不怠持心精勤義之慧是發勤之智二為未生之欲欲令不生故依不怠持心精勤義之慧是發勤之智為未生之出離令生故依不怠持心精勤義之慧是發勤之智為已生之出離令住不妄失倍修習廣修習圓滿故依不怠持心精勤義之慧是發勤之智乃至為未生之一切煩惱令不生故依不怠持心精勤義之慧是發勤之智為已生之一切煩惱令斷故依不怠持心精勤義之慧是發勤之智為已生之阿羅漢道令住不妄失倍修習廣修習圓滿故依不怠持心精勤義之慧是發勤之智依此所知之義是智依了知之義是慧故曰依不怠持心精勤義之慧是發勤之智第三十章一說明種種法之慧是顯示義之智者如何種種法者是五蘊十二處十八界善法不善法無記法欲纏法色纏法無色纏法非所攝法二說明者是色依無常而說明色依苦而說明色依無我而說明受乃至想乃至諸行乃至識乃至眼乃至老死是依無常而說明老死是依苦而說明老死是依無我而說明三義之顯示者斷欲欲以顯示出離之義斷瞋顯示無瞋之義斷惛眠顯示光明之義斷掉舉顯示無散亂之義斷疑顯示法決定之義斷無明顯示智之義斷不欣喜顯示勝喜之義斷五蓋顯示初靜慮之義乃至斷一切煩惱顯示阿羅漢道之義依此所知之義是智依了知之義是慧故曰說明種種法之慧是顯示義之智第三十一章通達一切諸法之攝一異性一性之慧是見清淨之智者如何一切諸法者是五蘊乃至非所攝法攝一者是依十二行相攝一切諸法為一言如之義無我之義諦之義通達之義證知之義遍知之義法之義界之義所知之義現證之義觸接之義現觀之義如是依十二行相攝一切諸法為一異性一性者欲欲是異性出離是一性乃至一切煩惱是異性阿羅漢道是一性通達者通達苦諦是遍智通達通達集諦是斷通達通達滅諦是現證誦達通達道諦是修習通達見清淨者乃於預流道之剎那見清淨於預流果之剎那見已清淨於一來道之剎那見清淨於一來果之剎那見已清淨於不還道之剎那見已清淨於不還果之剎那見已清淨於阿羅漢道之剎那見己清淨於阿羅漢果之剎那見已清淨此依所知之義是智依了知之義是慧故曰通達諸法之攝一異性一性之慧是見清淨之智第三十二章已解之慧是忍智者如何色是依無常而解色是依苦而解色是依無我而解凡已解之法是悉此忍故己解之慧是忍之智受乃至想乃至諸行乃至眼乃至老死是依無常而解老死是依苦而解老死是依無我而解凡已解之法是悉此忍故已解之慧是忍之智此依所知之義是智依了知之義是慧故曰已解之慧是忍之智第三十三章觸之慧是深解之智者如何色是依無常而觸色是依苦而觸色是依無我而觸凡觸法是悉此深解故觸之慧是深解之智受乃至想乃至諸行乃至識乃至眼乃至老死是依無常而觸老死是依苦而觸老死是依無我而觸凡觸法是悉此深解故觸之慧是深解之智此依所知之義是智依了知之義是慧故曰觸之慧是深解之智第三十四章總攝之慧是分住之智者如何以邪見為緣亦有所受以邪見寂靜為緣亦有所受以正見為緣亦有所受以正見寂靜為緣亦有所受以邪思惟為緣亦有所受以邪思惟寂靜為緣亦有所受以正思惟為緣亦有所受乃至以邪解脫為緣亦有所受以邪解脫寂靜為緣亦有所受以正解脫為緣亦有所受以正解脫寂靜為緣亦有所受以欲為緣亦有所受以欲寂靜為緣亦有所受以尋為緣亦有所受以尋寂靜為緣亦有所受以想為緣亦有所受以想